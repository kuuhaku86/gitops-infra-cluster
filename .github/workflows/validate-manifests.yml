name: Validate Manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kustomize
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" | tar xz
          sudo mv kustomize /usr/local/bin/kustomize

      - name: Validate base
        run: kustomize build apps/base/

      - name: Validate staging overlay
        run: kustomize build apps/overlays/staging/

      - name: Validate production overlay
        run: kustomize build apps/overlays/prod/

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Check YAML syntax
        run: |
          for f in argocd-apps/*.yaml; do
            echo "=== $f ==="
            python3 -c "import yaml; yaml.safe_load(open('$f'))" && echo "OK"
          done
