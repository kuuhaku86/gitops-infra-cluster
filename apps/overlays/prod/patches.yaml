apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-hello-app
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: go-hello-app
          env:
            - name: APP_ENV
              value: "prod"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
