apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-hello-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-hello-app
  template:
    metadata:
      labels:
        app: go-hello-app
    spec:
      containers:
        - name: go-hello-app
          image: ghcr.io/kuuhaku86/go-hello-app
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: "base"
